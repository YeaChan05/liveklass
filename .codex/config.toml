# oh-my-codex top-level settings (must be before any [table])
notify = ["node", "/opt/homebrew/lib/node_modules/oh-my-codex/dist/scripts/notify-hook.js"]
model_reasoning_effort = "medium"
developer_instructions = "You have oh-my-codex installed. AGENTS.md is the orchestration brain and main control surface. Follow AGENTS.md for skill/keyword routing, $name workflow invocation, and role-specialized subagents. Use outcome-first, concise progress updates: state the target result, constraints, validation evidence, and stop condition before adding process detail. Native subagents live in .codex/agents and may handle independent parallel subtasks within one Codex session or team pane. Skills load from .codex/skills, not native-agent TOMLs. Treat installed prompts as narrower execution surfaces under AGENTS.md authority."


model = "gpt-5.5"
model_context_window = 1000000
model_auto_compact_token_limit = 900000
approvals_reviewer = "user"
hide_agent_reasoning = true
service_tier = "fast"
sandbox_mode = "workspace-write"

[agents]
max_threads = 6
max_depth = 1

[sandbox_workspace_write]
network_access = true

[features]
apps = false
multi_agent = true
goals = true

child_agents_md = true
codex_hooks = true

[apps._default]
enabled = false

[env]
USE_OMX_EXPLORE_CMD = "1"

[profiles.lean]
web_search = "cached"
tool_output_token_limit = 2000

# ============================================================
# oh-my-codex (OMX) Configuration
# Managed by omx setup - manual edits preserved on next setup
# ============================================================

# OMX State Management MCP Server
[mcp_servers.omx_state]
command = "node"
args = ["/opt/homebrew/lib/node_modules/oh-my-codex/dist/mcp/state-server.js"]
enabled = true
startup_timeout_sec = 5

# OMX Project Memory MCP Server
[mcp_servers.omx_memory]
command = "node"
args = ["/opt/homebrew/lib/node_modules/oh-my-codex/dist/mcp/memory-server.js"]
enabled = true
startup_timeout_sec = 5

# OMX Code Intelligence MCP Server (LSP diagnostics, AST search)
[mcp_servers.omx_code_intel]
command = "node"
args = ["/opt/homebrew/lib/node_modules/oh-my-codex/dist/mcp/code-intel-server.js"]
enabled = true
startup_timeout_sec = 10

# OMX Trace MCP Server (agent flow timeline & statistics)
[mcp_servers.omx_trace]
command = "node"
args = ["/opt/homebrew/lib/node_modules/oh-my-codex/dist/mcp/trace-server.js"]
enabled = true
startup_timeout_sec = 5

# OMX Wiki MCP Server (persistent project knowledge base)
[mcp_servers.omx_wiki]
command = "node"
args = ["/opt/homebrew/lib/node_modules/oh-my-codex/dist/mcp/wiki-server.js"]
enabled = true
startup_timeout_sec = 5

# OMX TUI StatusLine (Codex CLI v0.101.0+)
[tui]
# omx:managed-status-line
status_line = ["model-with-reasoning", "git-branch", "context-remaining", "total-input-tokens", "total-output-tokens", "five-hour-limit", "weekly-limit"]

[projects."/Users/shinyechan/IdeaProjects/liveklass"]
trust_level = "trusted"

# ============================================================
# End oh-my-codex
