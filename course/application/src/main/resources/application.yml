spring:
  datasource:
    url: jdbc:mysql://localhost:3306/course?useSSL=false&serverTimezone=UTC&useInformationSchema=true
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/db.changelog-master.yaml
  docker:
    compose:
      file: docker-compose.yaml
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  jpa:
    hibernate:
      ddl-auto: validate
auth:
  token:
    access-expires-in: 3600 # 1 hour
    refresh-expires-in: 86400 # 24 hours
    salt: "saltsaltsaltsaltsaltsaltsaltsaltsaltsaltsaltsaltsaltsaltsaltsaltsaltsaltsaltsaltsalt"
